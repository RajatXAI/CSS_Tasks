<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <style>
        .detailscontainer{
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.983));
        }
    </style>
    <title>Document</title>
</head>
<body>
    
    <div class="w-full h-screen bg-black font-[Helvetica]">
        <div class="imagecontainer w-full h-screen relative ">
            <div class="maincard w-[130%] h-[130%] top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 absolute  z-[3] ">
                <img  class="w-full h-full object-cover" src="" alt="">
            </div>
            <div class="incomingcard w-[130%] h-[130%] top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 absolute z-[2] ">
                <img  class="w-full h-full object-cover" src="" alt="">
            </div>
        </div>
        <div class="absolute top-0 left-0 z-[4] w-full h-screen   flex flex-col justify-between">
            <div class="navbar px-5 py-6 flex justify-between items-center text-white">
                <div class="prflimg w-[3rem] h-[3rem] rounded-full overflow-hidden">
                    <img class="w-full h-full object-cover" src="" alt="">
                </div>
                <h3 class=" text-2xl font-medium tracking-tight">They liked you</h3>
                <div class="chaticon w-[3.5rem] h-[3.5rem] bg-white/20 rounded-full flex justify-center items-center relative">
                    <i class="ri-chat-3-fill  opacity-80 "></i>
                    <div class="badge absolute w-5 h-5 bg-[#FC5149] rounded-full flex justify-center items-center  top-0 right-0 -translate-y-[5px] translate-x-[3px]">
                        <h5 class="text-[10px] font-[400]"></h5>
                    </div>
                </div>
            </div>
            <div class="detailscontainer w-full">
                <div class="details px-5 py-6 w-full">
                    <div class="ee location flex gap-4">
                       <i class="w-[1.6rem] h-[1.6rem]  flex justify-center items-center font-semibold rounded-full ri-corner-left-up-line  bg-white"></i>
                       <h3 class="text-white"></h3>
                    </div>
                    <div class="ee name flex gap-5 text-white mt-1">
                        <h1 class="text-7xl font-regular tracking-tighter "></h1>
                        <h1 class="text-7xl font-regular tracking-tighter opacity-60"></h1>
                    </div>
                    <div class="ee tags flex gap-3 text-white mt-4">

                    </div>
                    <div class="ee bio  text-white/80 mt-5">
                        <h3 class="text-xl">Bio</h3>
                        <p class="text-lg mt-3"></p>
                    </div>
                    <div class="ee flex items-start mt-10 gap-1">
                        <button class="deny py-3 w-1/2 bg-white rounded-xl">
                            <i class=" font-semibold text-3xl  ri-close-line"></i>
                        </button>
                        <button class="accept py-3 w-1/2 bg-[#FC5149] rounded-xl">
                            <i class=" font-semibold text-3xl text-white ri-heart-3-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="main.js"></script>
</body>
</html>
